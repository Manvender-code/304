version: "3.8"

services:
  backend:
    build:
      context: ./backend

    ports:
      - "${BACKEND_PORT}:8000"

    environment:
      BACKEND_PORT: 8000

  frontend:
    build:
      context: ./frontend

      args:
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}

    ports:
      - "${FRONTEND_PORT}:80"

    environment:
      FRONTEND_PORT: 80

    depends_on:
      - backend